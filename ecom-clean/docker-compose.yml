services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app/src/Ecom.Api
    volumes:
      - ./backend-dotnet:/app
    command: sh -c "dotnet restore && dotnet run --urls http://0.0.0.0:8081"
    ports:
      - "8081:8081"

  web:
    image: node:20
    working_dir: /site
    volumes:
      - ./frontend-react:/site
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
